<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Event Display</title>
  <style>
    html,body{height:100%;margin:0;background:#000;color:#fff}
    #displayArea{width:100%;height:100%;display:flex;align-items:center;justify-content:center;overflow:hidden;transition:opacity 0.15s ease}
    img,video{width:100%;height:100%;object-fit:contain;display:block}
    #announcementBar{display:none;position:fixed;bottom:0;left:0;right:0;padding:18px 40px;text-align:center;z-index:100;transition:opacity 0.3s ease}
    #announcementText{font-size:2.2rem;font-weight:700;line-height:1.3;word-break:break-word}
    #hideOverlay{display:none;position:fixed;inset:0;background:#000;z-index:9999;transition:opacity 0.2s ease}
  </style>
</head>
<body>
  <div id="displayArea">No media</div>
  <div id="announcementBar"><div id="announcementText"></div></div>
  <div id="hideOverlay"></div>
  <script>
    const displayArea = document.getElementById('displayArea');
    const hideOverlay = document.getElementById('hideOverlay');
    let current = null;
    let currentVideo = null;

    window.addEventListener('message', e => {
      const msg = e.data;
      if (!msg || typeof msg !== 'object') return;
      if (msg.type === 'show') {
        // Always update content — even while hidden, so it's ready when revealed
        if (msg.transition) {
          displayArea.style.opacity = '0';
          setTimeout(() => {
            showMedia(msg.item);
            displayArea.style.opacity = '1';
          }, 150);
        } else {
          displayArea.style.opacity = '1';
          showMedia(msg.item);
        }
      }
      if (msg.type === 'pause') {
        if (currentVideo) currentVideo.pause();
      }
      if (msg.type === 'play') {
        if (currentVideo) currentVideo.play().catch(()=>{});
      }
      if (msg.type === 'announcement') {
        const bar = document.getElementById('announcementBar');
        const textEl = document.getElementById('announcementText');
        if (bar && textEl) {
          textEl.textContent = msg.text;
          bar.style.backgroundColor = msg.bgColor;
          bar.style.color = msg.textColor;
          bar.style.display = 'block';
        }
      }
      if (msg.type === 'clearAnnouncement') {
        const bar = document.getElementById('announcementBar');
        if (bar) bar.style.display = 'none';
      }
      if (msg.type === 'displayHide') {
        hideOverlay.style.display = 'block';
      }
      if (msg.type === 'displayUnhide') {
        hideOverlay.style.opacity = '1';
        hideOverlay.style.display = 'none';
      }
    });

    function sendMessageToOpener(message){
      if (window.opener && !window.opener.closed) {
        window.opener.postMessage(message, '*');
      }
    }

    function clear(){
      displayArea.innerHTML = '';
      currentVideo = null;
    }

    // Live camera / screen-share feed. The MediaStream object is passed by direct
    // reference from the opener window (same origin), since streams aren't serializable
    // through postMessage.
    window.showLiveStream = function(stream, opts){
      opts = opts || {};
      const apply = () => {
        clear();
        current = { type: 'live' };
        const v = document.createElement('video');
        v.srcObject = stream;
        v.autoplay = true;
        v.muted = !!opts.muted;
        v.playsInline = true;
        v.controls = false;
        v.style.maxWidth = '100%';
        v.style.maxHeight = '100%';
        displayArea.appendChild(v);
        currentVideo = v;
        v.play().catch(()=>{});
      };
      if (opts.transition) {
        displayArea.style.opacity = '0';
        setTimeout(() => { apply(); displayArea.style.opacity = '1'; }, 150);
      } else {
        displayArea.style.opacity = '1';
        apply();
      }
    };

    function showMedia(item){
      clear();
      current = item;
      if (!item) return;
      if (item.type.startsWith('image/')){
        const img = document.createElement('img');
        img.src = item.url;
        displayArea.appendChild(img);
      } else if (item.type.startsWith('video/')){
        const v = document.createElement('video');
        v.src = item.url;
        v.autoplay = !!item.autoplay;
        v.controls = false;
        v.playsInline = true;
        v.muted = !!item.muted;
        v.style.maxWidth='100%';
        v.style.maxHeight='100%';
        v.addEventListener('ended', ()=> sendMessageToOpener({type:'videoEnded'}));
        displayArea.appendChild(v);
        currentVideo = v;
      } else if (item.type === 'youtube-embed' || item.type === 'gdrive-embed' || item.type === 'gslides-embed') {
        const iframe = document.createElement('iframe');
        let src = item.embedUrl || '';
        if (item.type === 'youtube-embed' && item.autoplay) {
          src += (src.includes('?') ? '&' : '?') + 'autoplay=1&mute=0';
        }
        iframe.src = src;
        iframe.style.cssText = 'width:100%;height:100%;border:0;';
        iframe.allow = 'autoplay; fullscreen; encrypted-media';
        iframe.allowFullscreen = true;
        displayArea.appendChild(iframe);
      } else if (item.type === 'slide'){
        const div = document.createElement('div');
        div.style.fontSize='48px';
        div.textContent = item.title||'Slide';
        displayArea.appendChild(div);
      }
    }
  </script>
</body>
</html>
